data_vars:
  sigma_t:
    dtype: ["floating"]
    dims: ["w"]
    attrs:
      units:
        units_compatible: "km^-1"
  albedo:
    dtype: ["floating"]
    dims: ["w"]
  phase:
    dtype: ["floating"]
    dims:
      dims: ["w", "mu", "i", "j"]

coords:
  coords:
    w:
      dtype: ["floating"]
      dims: ["w"]
      attrs:
        units:
          units_compatible: "micrometer"
    mu:
      dtype: ["floating"]
      dims: ["mu"]
    theta*:  # star makes that field optional
      dtype: ["floating"]
      dims: ["mu"]
    i:
      dtype: "integer"
      dims: ["i"]
    j:
      dtype: "integer"
      dims: ["j"]
